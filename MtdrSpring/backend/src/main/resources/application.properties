# ============================================================
# Configuración compartida (base) - MyTodoList
# Para correr local: -Dspring-boot.run.profiles=local
# Para correr con Oracle: -Dspring-boot.run.profiles=oracle
# ============================================================

# Perfil activo por defecto (cambiar a 'oracle' para producción)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# JPA defaults
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Logging
logging.level.root=INFO
logging.level.com.springboot.MyTodoList=DEBUG

# DeepSeek (opcional - si no está configurado, la funcionalidad LLM se desactiva)
deepseek.api.key=${DEEPSEEK_API_KEY:disabled}
deepseek.api.url=${DEEPSEEK_API_URL:https://api.deepseek.com/v1/chat/completions}

# Telegram Bot (opcional - si no está configurado, el bot no arranca)
telegram.bot.token=${TELEGRAM_BOT_TOKEN:disabled}
telegram.bot.name=${TELEGRAM_BOT_NAME:mytodobot}
telegram.bot.enabled=${TELEGRAM_BOT_ENABLED:false}

# Servidor
server.port=8080

