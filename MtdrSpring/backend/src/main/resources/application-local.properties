# ============================================================
# Perfil LOCAL - Base de datos H2 en memoria
# Ejecutar con: mvn spring-boot:run -Dspring-boot.run.profiles=local
# ============================================================

# H2 Database
spring.datasource.url=jdbc:h2:mem:todolistdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (accesible en http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# Datos semilla
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-local.sql

# Logging
logging.level.root=INFO
logging.level.com.springboot.MyTodoList=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Desactivar Telegram bot y DeepSeek en perfil local
telegram.bot.enabled=false
telegram.bot.token=disabled
telegram.bot.name=disabled

deepseek.api.key=disabled
deepseek.api.url=https://localhost/disabled
